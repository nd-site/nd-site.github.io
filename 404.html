<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>404 - Không tìm thấy trang | ND Labs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/images/logo.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/js/nd-navbar.js" defer></script>
  <script src="/font/font.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #f8fafc;
    }

    .absolute-center-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      z-index: 10;
      pointer-events: none;
    }

    .bg-blob {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 112, 243, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
      border-radius: 50%;
      z-index: 0;
      filter: blur(80px);
      pointer-events: none;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      border-radius: 40px;
      padding: 3.5rem 2.5rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: auto;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-code {
      font-size: 8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0070f3 0%, #3291ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .btn-home {
      background: #0070f3;
      color: white;
      padding: 0.9rem 2.5rem;
      border-radius: 9999px;
      font-weight: 700;
      transition: all 0.3s;
      display: inline-block;
      box-shadow: 0 10px 20px -5px rgba(0, 112, 243, 0.4);
    }

    .btn-home:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 30px -5px rgba(0, 112, 243, 0.5);
      background: #0060d3;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      color: #94a3b8;
      font-size: 0.875rem;
      z-index: 20;
    }
  </style>
</head>

<body>
  <div class="bg-blob" style="top: -150px; left: -150px;"></div>
  <div class="bg-blob" style="bottom: -150px; right: -150px;"></div>

  <div class="absolute-center-wrapper">
    <div class="glass-card">
      <div class="error-code">404</div>
      <h1 class="text-3xl font-bold mb-4 text-slate-800">Ối! Trang này biến mất rồi</h1>
      <p class="text-slate-600 mb-8 text-lg">Rất tiếc, chúng tôi không tìm thấy nội dung bạn đang tìm kiếm. Có thể đường dẫn đã bị thay đổi hoặc không còn tồn tại.</p>
      <a href="/" class="btn-home">Quay về trang chủ</a>
    </div>
  </div>

  <footer>
    © 2026 ND Labs.
  </footer>
</body>

</html>
