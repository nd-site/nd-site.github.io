name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secrets into Config
        run: |
          # Dung kytu @ lam delimiter cho an toan hon | Thay the tren tat ca file config.js
          find . -name "config.js" -type f -exec sed -i "s@__GEMINI_API_KEY_PLACEHOLDER__@${{ secrets.GEMINI_API_KEY }}@g" {} +
          find . -name "config.js" -type f -exec sed -i "s@__FIREBASE_API_KEY_PLACEHOLDER__@${{ secrets.FIREBASE_API_KEY }}@g" {} +
          find . -name "config.js" -type f -exec sed -i "s@__FIREBASE_AUTH_DOMAIN_PLACEHOLDER__@${{ secrets.FIREBASE_AUTH_DOMAIN }}@g" {} +
          find . -name "config.js" -type f -exec sed -i "s@__FIREBASE_DATABASE_URL_PLACEHOLDER__@${{ secrets.FIREBASE_DATABASE_URL }}@g" {} +
          find . -name "config.js" -type f -exec sed -i "s@__FIREBASE_PROJECT_ID_PLACEHOLDER__@${{ secrets.FIREBASE_PROJECT_ID }}@g" {} +
          find . -name "config.js" -type f -exec sed -i "s@__FIREBASE_STORAGE_BUCKET_PLACEHOLDER__@${{ secrets.FIREBASE_STORAGE_BUCKET }}@g" {} +
          find . -name "config.js" -type f -exec sed -i "s@__FIREBASE_MESSAGING_SENDER_ID_PLACEHOLDER__@${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}@g" {} +
          find . -name "config.js" -type f -exec sed -i "s@__FIREBASE_APP_ID_PLACEHOLDER__@${{ secrets.FIREBASE_APP_ID }}@g" {} +
          find . -name "config.js" -type f -exec sed -i "s@__FIREBASE_MEASUREMENT_ID_PLACEHOLDER__@${{ secrets.FIREBASE_MEASUREMENT_ID }}@g" {} +

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload toan bo thu muc goc (khong qua Jekyll)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
