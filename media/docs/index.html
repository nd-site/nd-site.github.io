<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Viewer | ND Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/assets/js/nd-navbar.js" defer></script>
    <link rel="icon" href="/assets/images/logo.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .tab-active { color: #0070f3; border-bottom: 3px solid #0070f3; }
    </style>
</head>
<body class="min-h-screen py-10 px-6">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12">
            <div class="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-3xl mx-auto mb-6 shadow-lg shadow-blue-200">
                <i class="ph-duotone ph-files"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">Document Viewer</h1>
            <p class="text-slate-500 font-medium">Xem tài liệu Word và PowerPoint trực tuyến.</p>
        </header>

        <div class="flex justify-center gap-8 mb-10 border-b border-slate-200">
            <button onclick="switchTab('word')" id="tab-word" class="pb-4 font-bold text-slate-400 hover:text-slate-600 transition-all tab-active flex items-center gap-2">
                <i class="ph-bold ph-file-doc"></i> Word
            </button>
            <button onclick="switchTab('powerpoint')" id="tab-powerpoint" class="pb-4 font-bold text-slate-400 hover:text-slate-600 transition-all flex items-center gap-2">
                <i class="ph-bold ph-file-pptx"></i> PowerPoint
            </button>
        </div>

        <div id="doc-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Content Injected Here -->
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const grid = document.getElementById('doc-grid');
        let currentTab = 'word';

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-word').classList.toggle('tab-active', tab === 'word');
            document.getElementById('tab-powerpoint').classList.toggle('tab-active', tab === 'powerpoint');
            renderDocs();
        }

        function renderDocs() {
            grid.innerHTML = '';
            const docs = docData[currentTab];
            
            if(!docs || docs.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-bold uppercase tracking-widest">Không có tài liệu nào</div>';
                return;
            }

            docs.forEach((doc, idx) => {
                const card = document.createElement('a');
                card.href = doc.url;
                card.className = 'glass p-6 rounded-3xl flex items-center gap-5 hover:scale-[1.02] hover:shadow-xl hover:shadow-blue-500/5 transition-all group';
                
                const iconBg = currentTab === 'word' ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-600';
                const icon = currentTab === 'word' ? 'ph-file-doc' : 'ph-file-pptx';

                card.innerHTML = `
                    <div class="w-14 h-14 ${iconBg} rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        <i class="ph-duotone ${icon}"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800 mb-1 line-clamp-1">${doc.title}</h3>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">${currentTab}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = renderDocs;
    </script>
</body>
</html>
