<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Anh cùng Đăng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Chế độ điền từ */
        .blank-input {
            border-bottom: 2px solid #cbd5e1;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s;
            font-weight: 500;
            color: #1e293b;
        }
        .blank-input:focus { border-bottom-color: #3b82f6; background: #fff; }
        .blank-correct { border-bottom-color: #10b981 !important; background: #ecfdf5 !important; color: #065f46; }
        .blank-wrong { border-bottom-color: #ef4444 !important; background: #fef2f2 !important; }

        .active-sentence { border-left: 4px solid #3b82f6; background-color: #eff6ff; }
        
        .loading-spinner {
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .is-loading .fa-volume-up, .is-loading .fa-play { display: none; }
        .is-loading .loading-spinner { display: inline-block; }

        .playing-icon {
            display: none;
            color: #3b82f6;
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-3px); } }

        .is-playing .fa-volume-up { display: none; }
        .is-playing .playing-icon { display: inline-block; }
        
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .dot-cached { background-color: #10b981; }
        .dot-pending { background-color: #e2e8f0; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Xin chào, Đăng! 👋</h1>
            <p class="text-slate-600">Luyện tập bài nói về Ô nhiễm môi trường (Air Pollution)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="font-semibold text-lg mb-4 flex items-center">
                        <i class="fas fa-bolt mr-2 text-yellow-500"></i> Siêu tốc độ (Auto-Load)
                    </h2>
                    
                    <button id="btn-read-all" class="w-full mb-3 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl transition flex items-center justify-center disabled:opacity-50">
                        <i class="fas fa-play mr-2"></i>
                        <i class="fas fa-circle-notch loading-spinner mr-2"></i>
                        <span id="read-all-text">Nghe toàn bài</span>
                    </button>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">Chế độ luyện tập:</label>
                        <button id="toggle-memorize" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2 px-4 rounded-xl transition flex items-center justify-center">
                            <i class="fas fa-keyboard mr-2"></i> Chế độ điền cụm từ
                        </button>
                    </div>

                    <div class="mt-6 pt-6 border-t border-slate-100">
                        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Bộ nhớ đệm (Cache)</h3>
                        <div id="progress-container" class="flex flex-wrap gap-y-2 mb-2"></div>
                        <p id="cache-info" class="text-xs text-slate-500 italic">Đang nạp âm thanh tự động...</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 min-h-[500px]">
                    <div id="script-container" class="space-y-4 text-lg leading-relaxed text-slate-700"></div>
                </div>
            </div>
        </div>

        <div id="status-msg" class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-2 rounded-lg opacity-0 transition-opacity duration-300 text-sm z-50"></div>
    </div>

    <script>
        // Placeholder cho GitHub Actions. Nếu chạy ở môi trường preview, gán bằng chuỗi rỗng để sử dụng key nội bộ của hệ thống.
        const rawKey = "__GEMINI_API_KEY_PLACEHOLDER__";
        const apiKey = rawKey.includes("PLACEHOLDER") ? "" : rawKey;

        const audioCache = new Map(); 
        const loadingStates = new Set();
        let isPlayingSequence = false;
        let currentAudio = null;
        
        const scriptData = [
            "Good morning teacher and everyone.",
            "My name is Dang, and I'm sixteen years old.",
            "I live in Bao Lam 2, Lam Dong province.",
            "In my free time, I often go online to watch TikTok and Facebook.",
            "Today, I would like to talk about some simple ways to fix air pollution, which is a big problem today.",
            "Firstly, we should stop burning leaves and trash.",
            "By doing this, we can reduce smoke and dust, making the air cleaner for everyone.",
            "Secondly, people should use buses, trains, or electric bikes instead of cars and motorbikes.",
            "This will help cut down dirty smoke from traffic.",
            "In addition, we should plant more trees around our houses and schools because trees help to clean the air naturally by taking in carbon dioxide.",
            "To sum up, protecting the environment is not a big task; it starts with our daily actions.",
            "I hope we can all work together for a greener and healthier planet.",
            "Thank you for listening!"
        ];

        let isMemorizeMode = false;
        const container = document.getElementById('script-container');
        const statusMsg = document.getElementById('status-msg');
        const progressContainer = document.getElementById('progress-container');

        function initScript() {
            container.innerHTML = '';
            if (progressContainer.innerHTML === '') {
                scriptData.forEach((_, index) => {
                    const dot = document.createElement('span');
                    dot.className = 'progress-dot dot-pending';
                    dot.id = `dot-${index}`;
                    progressContainer.appendChild(dot);
                });
            }

            scriptData.forEach((sentence, index) => {
                const p = document.createElement('div');
                p.className = 'p-3 rounded-lg cursor-pointer hover:bg-slate-50 transition-colors sentence-item';
                p.id = `sentence-${index}`;
                
                p.innerHTML = `
                    <div class="flex items-start">
                        <button id="btn-audio-${index}" onclick="event.stopPropagation(); handleSentenceClick(${index})" 
                                class="mt-1 mr-3 text-blue-400 hover:text-blue-600 audio-btn flex items-center justify-center w-6 h-6">
                            <i class="fas fa-volume-up"></i>
                            <i class="fas fa-circle-notch loading-spinner text-blue-500"></i>
                            <i class="fas fa-volume-high playing-icon"></i>
                        </button>
                        <div class="text-content w-full" onclick="handleSentenceClick(${index})">
                            ${isMemorizeMode ? createInteractiveSentence(sentence, index) : sentence}
                        </div>
                    </div>
                `;
                container.appendChild(p);
            });
            
            preloadAll();
        }

        function createInteractiveSentence(text, sentenceIndex) {
            const words = text.split(' ');
            if (words.length < 4) return text;
            const blankLength = Math.floor(Math.random() * 2) + 2; 
            const startIndex = Math.floor(Math.random() * (words.length - blankLength - 1)) + 1;
            const targetWords = words.slice(startIndex, startIndex + blankLength).join(' ');
            const cleanTarget = targetWords.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").toLowerCase().trim();
            const before = words.slice(0, startIndex).join(' ');
            const after = words.slice(startIndex + blankLength).join(' ');

            return `
                ${before} 
                <input type="text" 
                    class="blank-input w-auto min-w-[100px]" 
                    style="width: ${targetWords.length * 10}px"
                    placeholder="..."
                    onkeyup="checkAnswer(this, '${cleanTarget}')"
                    onblur="checkAnswer(this, '${cleanTarget}')"
                    onclick="event.stopPropagation()"
                > 
                ${after}
            `;
        }

        window.checkAnswer = function(input, target) {
            const val = input.value.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").toLowerCase().trim();
            if (val === "") {
                input.classList.remove('blank-correct', 'blank-wrong');
                return;
            }
            if (val === target) {
                input.classList.add('blank-correct');
                input.classList.remove('blank-wrong');
            } else {
                input.classList.add('blank-wrong');
            }
        };

        async function preloadAll() {
            const concurrency = 3;
            for (let i = 0; i < scriptData.length; i += concurrency) {
                const chunk = [];
                for(let j=0; j<concurrency && (i+j)<scriptData.length; j++) {
                    chunk.push(getAudioBlob(i+j));
                }
                await Promise.all(chunk);
            }
        }

        async function getAudioBlob(index) {
            if (index >= scriptData.length) return null;
            if (audioCache.has(index)) return audioCache.get(index);
            if (loadingStates.has(index)) return null;

            loadingStates.add(index);
            const btn = document.getElementById(`btn-audio-${index}`);
            if (btn) btn.classList.add('is-loading');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: scriptData[index] }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } }
                            }
                        }
                    })
                });

                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const audioBlob = createAudioBlob(pcmData);
                
                audioCache.set(index, audioBlob);
                updateCacheStatus(index);
                return audioBlob;
            } catch (error) {
                return null;
            } finally {
                loadingStates.delete(index);
                if (btn) btn.classList.remove('is-loading');
            }
        }

        function playAudio(blob, index, onEndCallback = null) {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            document.querySelectorAll('.sentence-item').forEach(el => el.classList.remove('active-sentence', 'is-playing'));
            const el = document.getElementById(`sentence-${index}`);
            if (el) el.classList.add('active-sentence', 'is-playing');
            const url = URL.createObjectURL(blob);
            currentAudio = new Audio(url);
            currentAudio.onended = () => {
                URL.revokeObjectURL(url);
                const el = document.getElementById(`sentence-${index}`);
                if (el) el.classList.remove('is-playing');
                if (onEndCallback) onEndCallback();
            };
            currentAudio.play();
        }

        async function handleSentenceClick(index) {
            isPlayingSequence = false;
            const blob = await getAudioBlob(index);
            if (blob) playAudio(blob, index);
        }

        async function playFullSequence() {
            if (isPlayingSequence) {
                isPlayingSequence = false;
                if (currentAudio) currentAudio.pause();
                return;
            }
            isPlayingSequence = true;
            for (let i = 0; i < scriptData.length; i++) {
                if (!isPlayingSequence) break;
                const blob = await getAudioBlob(i);
                if (blob) {
                    await new Promise((resolve) => playAudio(blob, i, () => resolve()));
                }
            }
            isPlayingSequence = false;
        }

        function createAudioBlob(base64Data) {
            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const wavHeader = createWavHeader(bytes.length, 24000);
            return new Blob([wavHeader, bytes], { type: 'audio/wav' });
        }

        function createWavHeader(dataLength, sampleRate) {
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            view.setUint32(0, 0x52494646, false); 
            view.setUint32(4, 36 + dataLength, true); 
            view.setUint32(8, 0x57415645, false); 
            view.setUint32(12, 0x666d7420, false); 
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); 
            view.setUint32(40, dataLength, true);
            return header;
        }

        function updateCacheStatus(index) {
            const dot = document.getElementById(`dot-${index}`);
            if (dot) { dot.classList.remove('dot-pending'); dot.classList.add('dot-cached'); }
            const count = audioCache.size;
            const info = document.getElementById('cache-info');
            if (count === scriptData.length) {
                info.innerText = "🚀 Sẵn sàng! Toàn bộ bài đã được tải xong.";
                info.classList.add('text-green-600', 'font-bold');
            } else {
                info.innerText = `Đang nạp nhanh: ${count}/${scriptData.length} câu...`;
            }
        }

        document.getElementById('toggle-memorize').addEventListener('click', () => {
            isMemorizeMode = !isMemorizeMode;
            document.getElementById('toggle-memorize').innerHTML = isMemorizeMode ? 
                '<i class="fas fa-eye mr-2"></i> Chế độ đọc thông thường' : 
                '<i class="fas fa-keyboard mr-2"></i> Chế độ điền cụm từ';
            initScript();
        });

        document.getElementById('btn-read-all').addEventListener('click', playFullSequence);
        window.onload = initScript;
    </script>
</body>
</html>
