<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Anh cùng Đăng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden-word { background-color: #cbd5e1; color: transparent; border-radius: 4px; cursor: pointer; transition: all 0.3s; }
        .hidden-word:hover { background-color: #94a3b8; }
        .revealed { background-color: transparent !important; color: inherit !important; }
        .active-sentence { border-left: 4px solid #3b82f6; background-color: #eff6ff; }
        .audio-loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Xin chào, Đăng! 👋</h1>
            <p class="text-slate-600">Luyện tập bài nói về Ô nhiễm môi trường (Air Pollution)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Sidebar: Controls -->
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="font-semibold text-lg mb-4 flex items-center">
                        <i class="fas fa-cog mr-2 text-blue-500"></i> Công cụ học tập
                    </h2>
                    
                    <button id="btn-read-all" class="w-full mb-3 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl transition flex items-center justify-center">
                        <i class="fas fa-play mr-2"></i> Nghe toàn bài
                    </button>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">Chế độ hiển thị:</label>
                        <button id="toggle-memorize" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2 px-4 rounded-xl transition flex items-center justify-center">
                            <i class="fas fa-eye-slash mr-2"></i> Chế độ học thuộc
                        </button>
                    </div>

                    <div class="mt-6 pt-6 border-t border-slate-100">
                        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Từ vựng quan trọng</h3>
                        <div class="space-y-3 text-sm">
                            <div class="flex justify-between">
                                <span class="font-semibold text-blue-600">Air pollution</span>
                                <span class="text-slate-500">Ô nhiễm không khí</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="font-semibold text-blue-600">Reduce</span>
                                <span class="text-slate-500">Giảm bớt</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="font-semibold text-blue-600">Carbon dioxide</span>
                                <span class="text-slate-500">Khí CO2</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content: Script -->
            <div class="lg:col-span-2">
                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 min-h-[500px]">
                    <div id="script-container" class="space-y-4 text-lg leading-relaxed text-slate-700">
                        <!-- Script will be injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Notification Area -->
        <div id="status-msg" class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-2 rounded-lg opacity-0 transition-opacity duration-300 text-sm">
            Đang tải âm thanh...
        </div>
    </div>

    <script>
        const apiKey = "__GEMINI_API_KEY__";
        const scriptData = [
            "Good morning teacher and everyone.",
            "My name is Dang, and I'm sixteen years old.",
            "I live in Bao Lam 2, Lam Dong province.",
            "In my free time, I often go online to watch TikTok and Facebook.",
            "Today, I would like to talk about some simple ways to fix air pollution, which is a big problem today.",
            "Firstly, we should stop burning leaves and trash.",
            "By doing this, we can reduce smoke and dust, making the air cleaner for everyone.",
            "Secondly, people should use buses, trains, or electric bikes instead of cars and motorbikes.",
            "This will help cut down dirty smoke from traffic.",
            "In addition, we should plant more trees around our houses and schools because trees help to clean the air naturally by taking in carbon dioxide.",
            "To sum up, protecting the environment is not a big task; it starts with our daily actions.",
            "I hope we can all work together for a greener and healthier planet.",
            "Thank you for listening!"
        ];

        let isMemorizeMode = false;
        const container = document.getElementById('script-container');
        const statusMsg = document.getElementById('status-msg');

        // Initialize script UI
        function initScript() {
            container.innerHTML = '';
            scriptData.forEach((sentence, index) => {
                const p = document.createElement('p');
                p.className = 'p-3 rounded-lg cursor-pointer hover:bg-slate-50 transition-colors sentence-item';
                p.id = `sentence-${index}`;
                
                // Content with speaker icon
                p.innerHTML = `
                    <div class="flex items-start">
                        <button onclick="speakText('${sentence.replace(/'/g, "\\'")}', ${index})" class="mt-1 mr-3 text-blue-400 hover:text-blue-600">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <span class="text-content">${formatSentence(sentence)}</span>
                    </div>
                `;
                container.appendChild(p);
            });
        }

        function formatSentence(text) {
            if (!isMemorizeMode) return text;
            const words = text.split(' ');
            return words.map((word, i) => {
                // Hide roughly 40% of words in memorize mode
                if (i > 0 && Math.random() > 0.6 && word.length > 3) {
                    return `<span class="hidden-word" onclick="this.classList.add('revealed')">${word}</span>`;
                }
                return word;
            }).join(' ');
        }

        async function speakText(text, index = null) {
            showStatus("Đang chuẩn bị giọng đọc...");
            if (index !== null) {
                document.querySelectorAll('.sentence-item').forEach(el => el.classList.remove('active-sentence'));
                document.getElementById(`sentence-${index}`).classList.add('active-sentence');
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say clearly: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } }
                            }
                        }
                    })
                });

                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                playAudioFromBase64(pcmData);
                showStatus("Đang phát...");
            } catch (error) {
                console.error(error);
                showStatus("Lỗi khi tải âm thanh. Hãy thử lại!");
            }
        }

        function playAudioFromBase64(base64Data) {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            
            // PCM 16-bit to WAV conversion (simplified)
            const wavHeader = createWavHeader(len, 24000); // Kore usually uses 24kHz
            const blob = new Blob([wavHeader, bytes], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.play();
        }

        function createWavHeader(dataLength, sampleRate) {
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            view.setUint32(0, 0x52494646, false); // "RIFF"
            view.setUint32(4, 36 + dataLength, true);
            view.setUint32(8, 0x57415645, false); // "WAVE"
            view.setUint32(12, 0x666d7420, false); // "fmt "
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // "data"
            view.setUint32(40, dataLength, true);
            return header;
        }

        function showStatus(msg) {
            statusMsg.innerText = msg;
            statusMsg.style.opacity = '1';
            setTimeout(() => { statusMsg.style.opacity = '0'; }, 3000);
        }

        // Event Listeners
        document.getElementById('toggle-memorize').addEventListener('click', () => {
            isMemorizeMode = !isMemorizeMode;
            document.getElementById('toggle-memorize').innerHTML = isMemorizeMode ? 
                '<i class="fas fa-eye mr-2"></i> Hiển thị đầy đủ' : 
                '<i class="fas fa-eye-slash mr-2"></i> Chế độ học thuộc';
            initScript();
        });

        document.getElementById('btn-read-all').addEventListener('click', () => {
            speakText(scriptData.join(' '));
        });

        // Initialize on load
        window.onload = initScript;
    </script>
</body>
</html>
