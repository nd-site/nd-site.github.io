<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập NDID - ND Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <link rel="stylesheet" href="/auth/auth.css">
    <script src="/assets/js/nd-navbar.js" defer></script>
    <script src="/assets/js/config.js"></script>
    <script src="/font/font.js"></script>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/assets/images/logo.png" alt="ND Labs" class="auth-logo">
                <h1>Đăng nhập</h1>
                <p>Chào mừng trở lại với ND Labs</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="ndid">NDID của bạn</label>
                    <div class="input-container">
                        <i class="ph-duotone ph-user-circle"></i>
                        <input type="text" id="ndid" placeholder="Nhập NDID" autocomplete="username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-container">
                        <i class="ph-duotone ph-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
                            required>
                    </div>
                    <div style="text-align: right; margin-top: 6px;">
                        <a href="#" id="forgot-password-link" style="font-size: 12px; color: var(--primary); font-weight: 700; text-decoration: none;">Quên mật khẩu?</a>
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">
                    <span>Tiếp tục</span>
                    <i class="ph-bold ph-arrow-right"></i>
                </button>
                <div class="divider"><span>Hoặc</span></div>
                <button type="button" id="google-btn" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    <span>Đăng nhập với Google</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Chưa có tài khoản? <a href="/auth/register/">Tạo NDID ngay</a></p>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgot-password-modal" class="modal hidden" style="position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); align-items: center; justify-content: center; display: none;">
        <div style="background: white; border-radius: 24px; padding: 28px; max-width: 400px; width: 100%; border: 1px solid #e2e8f0; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); margin: 0 16px;">
            <h3 style="font-weight: 800; font-size: 18px; color: var(--text-main); margin: 0 0 8px 0; font-family: inherit;">Khôi phục mật khẩu</h3>
            <p style="font-size: 13px; color: var(--text-soft); margin-bottom: 20px; line-height: 1.5; font-family: inherit;">Nhập NDID của bạn để nhận liên kết đặt lại mật khẩu gửi đến email khôi phục đã đăng ký.</p>
            <div class="form-group" style="margin-bottom: 20px;">
                <div class="input-container" style="position: relative; display: flex; align-items: center;">
                    <i class="ph-duotone ph-identification-card" style="position: absolute; left: 16px; color: var(--text-soft); font-size: 18px;"></i>
                    <input type="text" id="forgot-ndid" placeholder="Nhập NDID của bạn" style="width: 100%; padding: 12px 16px 12px 46px; border: 1.5px solid #e2e8f0; border-radius: 14px; outline: none; font-family: inherit; font-size: 14px;">
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button id="cancel-forgot" style="padding: 10px 18px; border-radius: 10px; border: none; background: #f1f5f9; font-weight: 700; cursor: pointer; font-family: inherit;">Hủy</button>
                <button id="confirm-forgot" class="btn-primary" style="width: auto; margin-top: 0; padding: 10px 20px;">Gửi liên kết</button>
            </div>
        </div>
    </div>

    <div id="status-msg" class="status-msg"></div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, sendPasswordResetEmail }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Tái sử dụng Firebase App đã khởi tạo bởi firebase-init.js (nếu có), tránh lỗi "app already exists"
        let app;
        if (getApps().length > 0) {
            app = getApp();
        } else {
            const keys = await window.getEduKeys();
            const firebaseConfig = {
                apiKey: keys.firebase || EDU_CONFIG.firebaseApiKey,
                authDomain: keys.fbAuthDomain || EDU_CONFIG.firebaseAuthDomain,
                databaseURL: keys.fbDatabaseURL || EDU_CONFIG.firebaseDatabaseURL,
                projectId: keys.fbProjectId || EDU_CONFIG.firebaseProjectId,
                storageBucket: keys.fbStorageBucket || EDU_CONFIG.firebaseStorageBucket,
                messagingSenderId: keys.fbMessagingSenderId || EDU_CONFIG.firebaseMessagingSenderId,
                appId: keys.fbAppId || EDU_CONFIG.firebaseAppId,
                measurementId: keys.fbMeasurementId || EDU_CONFIG.firebaseMeasurementId
            };
            app = initializeApp(firebaseConfig);
        }
        const auth = getAuth(app);

        const loginForm = document.getElementById('login-form');
        const ndidInput = document.getElementById('ndid');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const googleBtn = document.getElementById('google-btn');
        const statusEl = document.getElementById('status-msg');

        function showStatus(text, type) {
            statusEl.textContent = text;
            statusEl.className = `status-msg show ${type}`;
            setTimeout(() => statusEl.className = 'status-msg', 4000);
        }

        const db = getFirestore(app);

        async function saveUserSession(user, customNdid = null) {
            let role = 'student';
            let yob = null;
            let grade = 'Khác';
            let ndid = customNdid || user.email.split('@')[0];
            let fullname = user.displayName || 'ND Member';

            try {
                const snap = await getDoc(doc(db, 'users', user.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    role = data.role || 'student';
                    yob = data.yob || null;
                    grade = data.grade || 'Khác';
                    ndid = data.ndid || ndid;
                    fullname = data.fullname || fullname;
                } else {
                    // Create base Firestore document for Google first-time login
                    try {
                        await saveNewUserDoc(db, user, ndid, fullname, role, yob, grade);
                    } catch (e) {
                        console.warn("Could not save initial user document:", e);
                    }
                }
            } catch (e) {
                console.warn("Error fetching user data from Firestore:", e);
            }

            localStorage.setItem('nd_user', JSON.stringify({
                displayName: fullname,
                email: user.email,
                photoURL: user.photoURL,
                uid: user.uid,
                ndid: ndid,
                role: role,
                yob: yob,
                grade: grade
            }));
        }

        async function saveNewUserDoc(db, user, ndid, fullname, role, yob, grade) {
            const { setDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
            await setDoc(doc(db, 'users', user.uid), {
                ndid,
                fullname,
                emails: [user.email],
                role,
                yob,
                grade,
                createdAt: new Date().toISOString()
            });
            await setDoc(doc(db, 'ndids', ndid), {
                uid: user.uid,
                recoveryEmail: user.email
            });
        }

        // Nếu đã đăng nhập → về trang chủ
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await saveUserSession(user);
                window.location.href = '/';
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const ndid = ndidInput.value.trim().toLowerCase();
            const password = passwordInput.value;
            if (!ndid || !password) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Đang xác thực...</span>';

            try {
                let email = `${ndid}@ndsite.web.app`;
                let cred;
                try {
                    cred = await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                        email = `${ndid}@ndlabs.com`;
                        cred = await signInWithEmailAndPassword(auth, email, password);
                    } else {
                        throw err;
                    }
                }
                await saveUserSession(cred.user, ndid);
                showStatus('Đăng nhập thành công!', 'success');
                setTimeout(() => window.location.href = '/', 800);
            } catch (err) {
                showStatus('NDID hoặc mật khẩu không đúng.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Tiếp tục</span><i class="ph-bold ph-arrow-right"></i>';
            }
        });

        googleBtn.addEventListener('click', async () => {
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                await saveUserSession(result.user);
                window.location.href = '/';
            } catch (err) {
                console.error("Google Auth Error:", err);
                const msg = err.code ? `Lỗi đăng nhập với Google (${err.code}).` : 'Lỗi đăng nhập với Google.';
                showStatus(msg, 'error');
            }
        });

        // Forgot password implementation
        const forgotLink = document.getElementById('forgot-password-link');
        const forgotModal = document.getElementById('forgot-password-modal');
        const forgotNdidInput = document.getElementById('forgot-ndid');
        const confirmForgotBtn = document.getElementById('confirm-forgot');

        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            forgotNdidInput.value = '';
            forgotModal.style.display = 'flex';
        });

        document.getElementById('cancel-forgot').addEventListener('click', () => {
            forgotModal.style.display = 'none';
        });

        confirmForgotBtn.addEventListener('click', async () => {
            const ndid = forgotNdidInput.value.trim().toLowerCase();
            if (!ndid) {
                alert('Vui lòng nhập NDID.');
                return;
            }

            confirmForgotBtn.disabled = true;
            confirmForgotBtn.textContent = 'Đang xử lý...';

            try {
                const ndidSnap = await getDoc(doc(db, 'ndids', ndid));
                if (!ndidSnap.exists()) {
                    throw new Error('NDID này không tồn tại trên hệ thống.');
                }
                const data = ndidSnap.data();
                const recoveryEmail = data.recoveryEmail;
                if (!recoveryEmail) {
                    throw new Error('Tài khoản này chưa cài đặt email khôi phục.');
                }

                await sendPasswordResetEmail(auth, recoveryEmail);
                showStatus(`Liên kết đặt lại mật khẩu đã gửi đến email: ${recoveryEmail.replace(/(.{3})(.*)(@.*)/, "$1***$3")}`, 'success');
                forgotModal.style.display = 'none';
            } catch (err) {
                alert('Lỗi khôi phục mật khẩu: ' + err.message);
            } finally {
                confirmForgotBtn.disabled = false;
                confirmForgotBtn.textContent = 'Gửi liên kết';
            }
        });
    </script>
</body>

</html>
