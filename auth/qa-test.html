<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Dashboard - Kiểm thử EduSpace Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <link rel="stylesheet" href="/auth/auth.css">
    <script src="/assets/js/nd-navbar.js" defer></script>
    <script src="/assets/js/config.js"></script>
    <script src="/font/font.js"></script>
    <style>
        .qa-container {
            max-width: 1000px;
            margin: 100px auto 40px;
            padding: 0 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .header-panel {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 24px;
            padding: 32px;
            color: white;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        .user-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .user-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border-color: #cbd5e1;
        }
        .status-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 100px;
            width: fit-content;
        }
        .status-pending { background: #f1f5f9; color: #64748b; }
        .status-loading { background: #fef08a; color: #a16207; }
        .status-success { background: #dcfce7; color: #16a34a; }
        .status-error { background: #fee2e2; color: #ef4444; }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #e2e8f0;
            color: #334155;
        }
        .btn-outline:hover { background: #f8fafc; }
        .logs-panel {
            background: #0f172a;
            color: #10b981;
            font-family: monospace;
            padding: 16px;
            border-radius: 16px;
            height: 250px;
            overflow-y: auto;
            font-size: 13px;
            margin-top: 24px;
        }
        .logs-panel div { margin-bottom: 4px; }
        .logs-panel .error { color: #f87171; }
        .logs-panel .info { color: #60a5fa; }
        .action-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="qa-container">
        <div class="header-panel">
            <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 8px; display: flex; align-items: center; gap: 12px;">
                <i class="ph-fill ph-flask"></i> QA Test Dashboard
            </h1>
            <p style="color: #94a3b8; font-size: 15px;">Trình tự động hóa kiểm thử tính năng Xác thực & Người dùng EduSpace</p>
            
            <div style="margin-top: 24px; display: flex; gap: 12px;">
                <button id="btn-create-all" class="btn-primary" style="margin: 0; width: auto; background: #3b82f6; border-color: #3b82f6;">
                    <i class="ph-bold ph-play"></i> Bắt đầu tạo 10 tài khoản
                </button>
                <button id="btn-logout" class="btn-sm btn-outline" style="color: white; border-color: #475569;">
                    Đăng xuất hiện tại
                </button>
            </div>
        </div>

        <div class="action-row">
            <h3 style="width: 100%; font-size: 16px; font-weight: 800; margin: 0 0 8px 0;"><i class="ph-bold ph-magic-wand"></i> Test Tính năng nhanh</h3>
            <button id="test-forgot" class="btn-sm btn-outline"><i class="ph-bold ph-envelope"></i> Gửi email quên mật khẩu cho testuser01</button>
            <button id="test-avatar" class="btn-sm btn-outline"><i class="ph-bold ph-image"></i> Đổi Avatar tài khoản hiện tại</button>
            <button id="test-delete" class="btn-sm btn-outline" style="color: #ef4444; border-color: #fecaca;"><i class="ph-bold ph-trash"></i> Xóa tài khoản hiện tại</button>
            <button onclick="window.open('/auth/settings/', '_blank')" class="btn-sm btn-outline"><i class="ph-bold ph-git-merge"></i> Mở trang Settings (Đổi thông tin/Merge)</button>
        </div>

        <h2 style="font-size: 20px; font-weight: 800; margin-top: 32px; color: #1e293b;">Danh sách Tài khoản Kiểm thử</h2>
        <div class="user-grid" id="user-grid">
            <!-- Rendered by JS -->
        </div>

        <div class="logs-panel" id="logs">
            <div class="info">Ready. Chờ lệnh bắt đầu...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile, sendPasswordResetEmail } 
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc } 
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Initialize
        const keys = await window.getEduKeys();
        const firebaseConfig = {
            apiKey: keys.firebase || EDU_CONFIG.firebaseApiKey,
            authDomain: keys.fbAuthDomain || EDU_CONFIG.firebaseAuthDomain,
            databaseURL: keys.fbDatabaseURL || EDU_CONFIG.firebaseDatabaseURL,
            projectId: keys.fbProjectId || EDU_CONFIG.firebaseProjectId,
            storageBucket: keys.fbStorageBucket || EDU_CONFIG.firebaseStorageBucket,
            messagingSenderId: keys.fbMessagingSenderId || EDU_CONFIG.firebaseMessagingSenderId,
            appId: keys.fbAppId || EDU_CONFIG.firebaseAppId,
            measurementId: keys.fbMeasurementId || EDU_CONFIG.firebaseMeasurementId
        };
        const app = getApps().length > 0 ? getApp() : initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const COMMON_PASSWORD = "Test@12345";

        const testUsers = [
            { ndid: 'testuser01', fullname: 'Nguyễn Văn An', role: 'student', yob: 2008, grade: '12' },
            { ndid: 'testuser02', fullname: 'Trần Thị Bình', role: 'student', yob: 2009, grade: '11' },
            { ndid: 'testuser03', fullname: 'Lê Văn Cường', role: 'student', yob: 2010, grade: '10' },
            { ndid: 'testuser04', fullname: 'Phạm Thị Dung', role: 'student', yob: 2008, grade: '12' },
            { ndid: 'testuser05', fullname: 'Hoàng Văn Em', role: 'student', yob: 2009, grade: '11' },
            { ndid: 'testteacher01', fullname: 'Nguyễn Thị Phương', role: 'teacher', yob: 1985, grade: 'Đang dạy' },
            { ndid: 'testteacher02', fullname: 'Trần Văn Quân', role: 'teacher', yob: 1988, grade: 'Đang dạy' },
            { ndid: 'testuser06', fullname: 'Vũ Thị Sen', role: 'student', yob: 2008, grade: '12' },
            { ndid: 'testuser07', fullname: 'Đặng Văn Tài', role: 'student', yob: 2009, grade: '11' },
            { ndid: 'testuser08', fullname: 'Bùi Thị Uyên', role: 'student', yob: 2010, grade: '10' },
        ];

        const grid = document.getElementById('user-grid');
        const logsEl = document.getElementById('logs');

        function log(msg, type='normal') {
            const d = document.createElement('div');
            d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if(type !== 'normal') d.className = type;
            logsEl.appendChild(d);
            logsEl.scrollTop = logsEl.scrollHeight;
        }

        function renderGrid() {
            grid.innerHTML = '';
            testUsers.forEach((u, idx) => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <div style="font-size: 15px; font-weight: 800; color: #0f172a;">${u.ndid}</div>
                            <div style="font-size: 13px; color: #64748b;">${u.fullname}</div>
                        </div>
                        <div id="badge-${idx}" class="status-badge status-pending">Chưa tạo</div>
                    </div>
                    <div style="font-size: 12px; color: #475569; margin: 4px 0;">
                        Vai trò: <strong>${u.role}</strong> • Lớp: <strong>${u.grade}</strong> • Yob: ${u.yob}
                    </div>
                    <div style="margin-top: auto; padding-top: 12px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px;">
                        <button class="btn-sm btn-outline login-btn" data-idx="${idx}"><i class="ph-bold ph-sign-in"></i> Test Đăng nhập</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.querySelectorAll('.login-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const idx = e.currentTarget.getAttribute('data-idx');
                    const u = testUsers[idx];
                    try {
                        const email = `${u.ndid}@ndsite.web.app`;
                        log(`Đang thử đăng nhập vào ${u.ndid}...`, 'info');
                        const cred = await signInWithEmailAndPassword(auth, email, COMMON_PASSWORD);
                        
                        localStorage.setItem('nd_user', JSON.stringify({
                            displayName: u.fullname,
                            email: email,
                            photoURL: null,
                            uid: cred.user.uid,
                            ndid: u.ndid,
                            role: u.role,
                            yob: u.yob,
                            grade: u.grade
                        }));
                        
                        log(`✅ Đăng nhập ${u.ndid} thành công!`, 'success');
                        alert(`Đăng nhập thành công với tư cách ${u.fullname}`);
                        window.location.reload();
                    } catch (err) {
                        log(`❌ Lỗi đăng nhập ${u.ndid}: ${err.message}`, 'error');
                        alert(`Lỗi: ${err.message}`);
                    }
                });
            });
        }

        renderGrid();

        document.getElementById('btn-create-all').addEventListener('click', async () => {
            log('Bắt đầu quy trình tạo tài khoản...', 'info');
            document.getElementById('btn-create-all').disabled = true;

            for (let i = 0; i < testUsers.length; i++) {
                const u = testUsers[i];
                const badge = document.getElementById(`badge-${i}`);
                const email = `${u.ndid}@ndsite.web.app`;
                
                badge.className = 'status-badge status-loading';
                badge.textContent = 'Đang xử lý...';
                
                try {
                    // Try to create
                    log(`Đang tạo ${u.ndid}...`);
                    const cred = await createUserWithEmailAndPassword(auth, email, COMMON_PASSWORD);
                    const uid = cred.user.uid;

                    // Update display name
                    await updateProfile(cred.user, { displayName: u.fullname });

                    // Write to Firestore
                    await setDoc(doc(db, 'ndids', u.ndid), { uid: uid, recoveryEmail: email });
                    await setDoc(doc(db, 'users', uid), {
                        ndid: u.ndid,
                        fullname: u.fullname,
                        emails: [email],
                        role: u.role,
                        yob: u.yob,
                        grade: u.grade,
                        createdAt: new Date().toISOString()
                    });

                    log(`✅ Đã tạo thành công ${u.ndid}`);
                    badge.className = 'status-badge status-success';
                    badge.textContent = 'Thành công';

                    // Sign out so we can create the next
                    await signOut(auth);
                } catch (err) {
                    if (err.code === 'auth/email-already-in-use') {
                        log(`⚠️ ${u.ndid} đã tồn tại, bỏ qua.`);
                        badge.className = 'status-badge status-success';
                        badge.textContent = 'Đã tồn tại';
                    } else {
                        log(`❌ Lỗi tạo ${u.ndid}: ${err.message}`, 'error');
                        badge.className = 'status-badge status-error';
                        badge.textContent = 'Lỗi';
                    }
                }
            }
            log('🎉 Đã hoàn tất quy trình tạo tài khoản.', 'success');
            document.getElementById('btn-create-all').disabled = false;
        });

        document.getElementById('btn-logout').addEventListener('click', async () => {
            await signOut(auth);
            localStorage.removeItem('nd_user');
            log('Đã đăng xuất tài khoản hiện tại.');
        });

        document.getElementById('test-forgot').addEventListener('click', async () => {
            log('Đang thử gửi email khôi phục cho testuser01...', 'info');
            try {
                // Email format used internally in registration test
                await sendPasswordResetEmail(auth, "testuser01@ndsite.web.app");
                log('✅ Lệnh gửi password reset thành công (Note: ndsite.web.app là email ảo nên sẽ không nhận được thư thật).', 'success');
                alert('Test lệnh gửi mail khôi phục thành công!');
            } catch(e) {
                log('❌ Lỗi: ' + e.message, 'error');
            }
        });

        document.getElementById('test-avatar').addEventListener('click', async () => {
            const user = auth.currentUser;
            if(!user) return alert('Chưa đăng nhập! Vui lòng đăng nhập một tài khoản ở dưới trước.');
            log(`Đang giả lập update Avatar cho ${user.uid}...`, 'info');
            try {
                const dummyUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
                await updateProfile(user, { photoURL: dummyUrl });
                await setDoc(doc(db, 'users', user.uid), { photoURL: dummyUrl }, { merge: true });
                
                const s = JSON.parse(localStorage.getItem('nd_user') || '{}');
                s.photoURL = dummyUrl; 
                localStorage.setItem('nd_user', JSON.stringify(s));
                
                log('✅ Đã đổi avatar thành công!', 'success');
                alert('Đã đổi Avatar thành Avatar ngẫu nhiên!');
            } catch(e) {
                log('❌ Lỗi đổi avatar: ' + e.message, 'error');
            }
        });

        document.getElementById('test-delete').addEventListener('click', async () => {
            const user = auth.currentUser;
            if(!user) return alert('Chưa đăng nhập! Vui lòng đăng nhập tài khoản cần xóa trước.');
            if(!confirm(`Bạn có chắc chắn muốn test XÓA tài khoản ${user.email}?`)) return;
            
            try {
                log(`Đang tiến hành xóa user ${user.uid}...`, 'info');
                // Get NDID before deleting to clear ndids doc
                const s = JSON.parse(localStorage.getItem('nd_user') || '{}');
                const ndid = s.ndid || user.email.split('@')[0];

                await deleteDoc(doc(db, 'users', user.uid));
                await deleteDoc(doc(db, 'ndids', ndid));
                
                await user.delete();
                localStorage.removeItem('nd_user');
                
                log('✅ Đã xóa tài khoản và dữ liệu thành công!', 'success');
                alert('Tài khoản đã bị xóa!');
                window.location.reload();
            } catch(e) {
                log('❌ Lỗi xóa: ' + e.message, 'error');
                if(e.code === 'auth/requires-recent-login') {
                    alert('Lỗi: Cần đăng nhập lại gần đây để thực hiện tác vụ xóa.');
                }
            }
        });
    </script>
</body>
</html>
