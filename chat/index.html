<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatND by ND Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>

    <!-- KaTeX & Marked.js for NDAI Math & Markdown rendering (Inherited from EduAI) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="/chat/chat.css">
    <script src="/assets/js/nd-navbar.js" defer></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/api-service.js"></script>
    <script src="/font/font.js"></script>
</head>

<body>
    <div id="chat-app" class="chat-app-wrapper">
        <!-- Sidebar -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <div class="user-profile-bar">
                    <div class="user-info-mini">
                        <img id="my-avatar" src="/assets/images/logo.png" alt="Avatar" onerror="this.src='/assets/images/logo.png'">
                        <div class="user-details-mini">
                            <h4 id="my-name">ND Member</h4>
                            <p id="my-ndid">ndid</p>
                        </div>
                    </div>
                </div>

                <div class="search-box-rel">
                    <i class="ph-bold ph-magnifying-glass"></i>
                    <input type="text" id="search-ndid-input" class="search-input" placeholder="Tìm theo tên hoặc NDID..." autocomplete="off">
                    <div id="search-results-overlay" class="search-results-overlay"></div>
                </div>
            </div>

            <!-- Active Conversations List -->
            <div id="conversations-list" class="conversations-list">
                <div style="padding: 24px; text-align: center; color: var(--text-soft); font-size: 13px;">
                    Đang tải danh sách trò chuyện...
                </div>
            </div>
        </aside>

        <!-- Main Chat Panel -->
        <main class="chat-main-panel">
            <!-- Empty State when no conversation selected -->
            <div id="chat-empty-state" class="chat-empty-state">
                <div class="chat-empty-icon">
                    <i class="ph-duotone ph-chat-circle-dots"></i>
                </div>
                <h3>Chào mừng đến với ChatND by ND Labs</h3>
                <p>Nhắn tin trực tiếp với <strong>Admin @nhatdang</strong>, hỏi đáp cùng <strong>NDAI</strong> hoặc tìm bạn bè để bắt đầu trò chuyện.</p>
            </div>

            <!-- Active Chat Interface -->
            <div id="active-chat-wrapper" class="active-chat-wrapper hidden" style="display: none;">
                <header class="chat-header">
                    <div class="chat-header-user">
                        <button id="mobile-back-btn" class="mobile-back-btn" title="Quay lại">
                            <i class="ph-bold ph-arrow-left"></i>
                        </button>
                        <img id="active-contact-avatar" src="/assets/images/logo.png" alt="Contact Avatar" class="chat-header-avatar" onerror="this.src='/assets/images/logo.png'">
                        <div>
                            <div id="active-contact-name" class="chat-header-title">Người dùng</div>
                            <div id="active-contact-ndid" class="chat-header-sub">ndid</div>
                        </div>
                    </div>
                </header>

                <!-- Messages Container -->
                <div id="messages-container" class="messages-container"></div>

                <!-- Input Form -->
                <form id="chat-input-form" class="chat-input-bar">
                    <input type="text" id="message-text-input" class="chat-message-input" placeholder="Nhập tin nhắn..." autocomplete="off" required>
                    <button type="submit" id="btn-send-message" class="btn-send-message">
                        <span>Gửi</span>
                        <i class="ph-bold ph-paper-plane-right"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import {
            getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, addDoc, query, where, orderBy, onSnapshot, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Global Error suppressor for DevTools clean output
        window.addEventListener('unhandledrejection', (event) => {
            if (event.reason && (event.reason.code === 403 || event.reason.status === 403 || event.reason.code === 'permission-denied')) {
                event.preventDefault();
            }
        });

        let app;
        if (getApps().length > 0) {
            app = getApp();
        } else {
            const keys = await window.getEduKeys();
            const firebaseConfig = {
                apiKey: keys.firebase || EDU_CONFIG.firebaseApiKey,
                authDomain: keys.fbAuthDomain || EDU_CONFIG.firebaseAuthDomain,
                databaseURL: keys.fbDatabaseURL || EDU_CONFIG.firebaseDatabaseURL,
                projectId: keys.fbProjectId || EDU_CONFIG.firebaseProjectId,
                storageBucket: keys.fbStorageBucket || EDU_CONFIG.firebaseStorageBucket,
                messagingSenderId: keys.fbMessagingSenderId || EDU_CONFIG.firebaseMessagingSenderId,
                appId: keys.fbAppId || EDU_CONFIG.firebaseAppId,
                measurementId: keys.fbMeasurementId || EDU_CONFIG.firebaseMeasurementId
            };
            app = initializeApp(firebaseConfig);
        }

        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentUserNdid = '';
        let activeContact = null;
        let activeChatId = null;
        let unsubscribeMessages = null;
        let unsubscribeConversations = null;
        let openPickerMsgId = null;
        let aiHasGreeted = false;

        // Admin Contact Info
        let adminContact = {
            uid: 'admin_nhatdang',
            ndid: '@nhatdang',
            name: 'Nhật Đăng (Admin)',
            avatar: '/assets/images/logo.png',
            isAdmin: true,
            isPinned: true
        };

        // NDAI Bot Contact Info
        const aiBotContact = {
            uid: 'ndai_bot',
            ndid: 'ndai',
            name: 'NDAI Assistant ✨',
            avatar: '/assets/images/logo.png',
            isBot: true,
            isPinned: true
        };

        // Emojis list
        const EMOJI_LIST = ['❤️', '👍', '😂', '😮', '😢', '👏'];

        // Elements
        const myAvatar = document.getElementById('my-avatar');
        const myName = document.getElementById('my-name');
        const myNdid = document.getElementById('my-ndid');
        const searchInput = document.getElementById('search-ndid-input');
        const searchOverlay = document.getElementById('search-results-overlay');
        const convsListEl = document.getElementById('conversations-list');
        
        const chatEmptyState = document.getElementById('chat-empty-state');
        const activeChatWrapper = document.getElementById('active-chat-wrapper');
        const activeAvatar = document.getElementById('active-contact-avatar');
        const activeName = document.getElementById('active-contact-name');
        const activeNdid = document.getElementById('active-contact-ndid');
        const messagesContainer = document.getElementById('messages-container');
        const chatInputForm = document.getElementById('chat-input-form');
        const messageInput = document.getElementById('message-text-input');
        const mobileBackBtn = document.getElementById('mobile-back-btn');
        const appWrapper = document.getElementById('chat-app');

        // Check Auth
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/auth/login/';
                return;
            }
            currentUser = user;

            // Load profile
            let fullname = user.displayName || 'ND Member';
            let ndid = user.email ? user.email.split('@')[0] : user.uid;
            let avatar = user.photoURL || '/assets/images/logo.png';

            try {
                const snap = await getDoc(doc(db, 'users', user.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    fullname = data.fullname || fullname;
                    ndid = data.ndid || ndid;
                    if (data.photoURL) avatar = data.photoURL;
                }
            } catch (_) {}

            currentUserNdid = ndid;
            myName.textContent = fullname;
            myNdid.textContent = ndid;
            myAvatar.src = avatar;

            // Fetch Admin's actual UID from Firestore ndids collection
            try {
                const ndidSnap = await getDoc(doc(db, 'ndids', 'nhatdang'));
                if (ndidSnap.exists()) {
                    const targetUid = ndidSnap.data().uid;
                    adminContact.uid = targetUid;
                    const uSnap = await getDoc(doc(db, 'users', targetUid));
                    if (uSnap.exists()) {
                        const d = uSnap.data();
                        adminContact.name = d.fullname || d.displayName || 'Nhật Đăng (Admin)';
                        if (d.photoURL) adminContact.avatar = d.photoURL;
                    }
                }
            } catch (_) {}

            loadConversationsList();
        });

        // Smart Search (Name + NDID + Admin)
        let searchTimeout = null;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const rawVal = e.target.value.trim();
            const val = rawVal.toLowerCase().replace(/^@/, '');
            if (!val) {
                searchOverlay.style.display = 'none';
                searchOverlay.innerHTML = '';
                return;
            }

            searchTimeout = setTimeout(async () => {
                try {
                    let results = [];

                    // 1. Search Admin @nhatdang match
                    if ('nhatdang'.includes(val) || 'admin'.includes(val) || 'nhật đăng'.includes(val)) {
                        results.push({
                            uid: adminContact.uid,
                            ndid: '@nhatdang',
                            fullname: adminContact.name,
                            photoURL: adminContact.avatar,
                            isAdmin: true
                        });
                    }

                    // 2. Search NDAI Bot match
                    if ('ndai'.includes(val) || 'bot'.includes(val) || 'ai'.includes(val) || 'trợ lý'.includes(val) || 'eduai'.includes(val)) {
                        results.push({
                            uid: 'ndai_bot',
                            ndid: 'ndai',
                            fullname: 'NDAI Assistant ✨',
                            photoURL: '/assets/images/logo.png',
                            isBot: true
                        });
                    }

                    // 3. Search Firestore users collection by name or ndid
                    try {
                        const usersSnap = await getDocs(collection(db, 'users'));
                        usersSnap.forEach(docSnap => {
                            const u = docSnap.data();
                            const uUid = docSnap.id;
                            if (uUid === currentUser.uid) return;

                            const uName = (u.fullname || u.displayName || '').toLowerCase();
                            const uNdid = (u.ndid || '').toLowerCase();

                            if (uName.includes(val) || uNdid.includes(val)) {
                                if (!results.some(r => r.uid === uUid)) {
                                    results.push({
                                        uid: uUid,
                                        ndid: u.ndid || uUid,
                                        fullname: u.fullname || u.displayName || 'ND Member',
                                        photoURL: u.photoURL || '/assets/images/logo.png',
                                        isAdmin: u.role === 'admin' || u.ndid === 'nhatdang'
                                    });
                                }
                            }
                        });
                    } catch (_) {}

                    if (results.length === 0) {
                        searchOverlay.innerHTML = `<div style="padding:14px;text-align:center;color:var(--text-soft);font-size:13px;">Không tìm thấy "${escapeHtml(rawVal)}"</div>`;
                    } else {
                        searchOverlay.innerHTML = results.map(u => `
                            <div class="search-result-item" data-uid="${u.uid}" data-ndid="${u.ndid}" data-name="${escapeHtml(u.fullname)}" data-avatar="${u.photoURL}" data-is-admin="${u.isAdmin ? 'true' : 'false'}" data-is-bot="${u.isBot ? 'true' : 'false'}">
                                <img src="${u.photoURL}" alt="" onerror="this.src='/assets/images/logo.png'">
                                <div>
                                    <div style="font-weight:800;font-size:14px;color:var(--text-main);display:flex;align-items:center;gap:6px;">
                                        ${escapeHtml(u.fullname)}
                                        ${u.isAdmin ? '<span class="pinned-tag admin-badge">🛡️ Admin</span>' : ''}
                                        ${u.isBot ? '<span class="pinned-tag ai-badge">🤖 AI</span>' : ''}
                                    </div>
                                    <div style="font-size:12px;color:var(--primary);font-weight:700;">${u.ndid}</div>
                                </div>
                            </div>
                        `).join('');

                        searchOverlay.querySelectorAll('.search-result-item').forEach(item => {
                            item.addEventListener('click', () => {
                                const contact = {
                                    uid: item.dataset.uid,
                                    ndid: item.dataset.ndid,
                                    name: item.dataset.name,
                                    avatar: item.dataset.avatar,
                                    isAdmin: item.dataset.isAdmin === 'true',
                                    isBot: item.dataset.isBot === 'true'
                                };
                                searchOverlay.style.display = 'none';
                                searchInput.value = '';
                                selectConversation(contact);
                            });
                        });
                    }
                    searchOverlay.style.display = 'block';
                } catch (err) {
                    console.warn("Search error:", err);
                }
            }, 300);
        });

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchOverlay.contains(e.target)) {
                searchOverlay.style.display = 'none';
            }
            if (openPickerMsgId && !e.target.closest('.reaction-picker-bar') && !e.target.closest('.msg-bubble')) {
                closePicker();
            }
        });

        // Load Conversations List (Admin & NDAI Pinned at top)
        function loadConversationsList() {
            if (unsubscribeConversations) unsubscribeConversations();

            try {
                const q = query(
                    collection(db, 'chats'),
                    where('participants', 'array-contains', currentUser.uid)
                );

                unsubscribeConversations = onSnapshot(q, async (snapshot) => {
                    let userConvs = [];
                    snapshot.forEach(docSnap => {
                        userConvs.push({ id: docSnap.id, ...docSnap.data() });
                    });

                    userConvs.sort((a, b) => (b.updatedAt?.toMillis?.() || 0) - (a.updatedAt?.toMillis?.() || 0));

                    let html = '';

                    // 1. PINNED ITEM 1: Admin @nhatdang (Direct Chat to Admin)
                    const isAdminSelected = activeChatId === `chat_${[currentUser.uid, adminContact.uid].sort().join('_')}`;
                    html += `
                        <div class="conv-item pinned admin-pinned ${isAdminSelected ? 'active' : ''}" data-type="admin" data-uid="${adminContact.uid}" data-ndid="@nhatdang" data-name="${escapeHtml(adminContact.name)}" data-avatar="${adminContact.avatar}">
                            <div class="conv-avatar-rel">
                                <img src="${adminContact.avatar}" alt="" onerror="this.src='/assets/images/logo.png'">
                            </div>
                            <div class="conv-details">
                                <div class="conv-top-row">
                                    <span class="conv-name" style="display:flex;align-items:center;gap:4px;">
                                        ${escapeHtml(adminContact.name)}
                                        <span class="pinned-tag admin-badge">🛡️ Admin</span>
                                    </span>
                                    <span class="conv-time">📌 Ghim</span>
                                </div>
                                <div class="conv-last-msg">Nhắn tin trực tiếp tới Admin ND Labs</div>
                            </div>
                        </div>
                    `;

                    // 2. PINNED ITEM 2: NDAI Assistant (AI Engine)
                    const isAiSelected = activeChatId === 'chat_ndai_bot';
                    html += `
                        <div class="conv-item pinned ai-pinned ${isAiSelected ? 'active' : ''}" data-type="ai" data-uid="ndai_bot" data-ndid="ndai" data-name="NDAI Assistant ✨" data-avatar="/assets/images/logo.png">
                            <div class="conv-avatar-rel">
                                <img src="/assets/images/logo.png" alt="" onerror="this.src='/assets/images/logo.png'">
                            </div>
                            <div class="conv-details">
                                <div class="conv-top-row">
                                    <span class="conv-name" style="display:flex;align-items:center;gap:4px;">
                                        NDAI Assistant ✨
                                        <span class="pinned-tag ai-badge">🤖 AI</span>
                                    </span>
                                    <span class="conv-time">📌 Ghim</span>
                                </div>
                                <div class="conv-last-msg">Trợ lý trí tuệ nhân tạo ND Labs</div>
                            </div>
                        </div>
                    `;

                    // 3. REGULAR USER CONVERSATIONS
                    for (const conv of userConvs) {
                        const otherUid = conv.participants.find(id => id !== currentUser.uid) || currentUser.uid;
                        if (otherUid === adminContact.uid) continue; // Skip admin since admin is pinned

                        let otherName = 'ND Member';
                        let otherNdid = 'ndid';
                        let otherAvatar = '/assets/images/logo.png';

                        try {
                            const uSnap = await getDoc(doc(db, 'users', otherUid));
                            if (uSnap.exists()) {
                                const d = uSnap.data();
                                otherName = d.fullname || d.displayName || otherName;
                                otherNdid = d.ndid || otherNdid;
                                if (d.photoURL) otherAvatar = d.photoURL;
                            }
                        } catch (_) {
                            if (conv.participantDetails && conv.participantDetails[otherUid]) {
                                const d = conv.participantDetails[otherUid];
                                otherName = d.name || otherName;
                                otherNdid = d.ndid || otherNdid;
                                otherAvatar = d.avatar || otherAvatar;
                            }
                        }

                        const isSelected = activeChatId === conv.id;
                        const timeStr = conv.updatedAt?.toDate ? formatShortTime(conv.updatedAt.toDate()) : '';

                        html += `
                            <div class="conv-item ${isSelected ? 'active' : ''}" data-chat-id="${conv.id}" data-uid="${otherUid}" data-ndid="${otherNdid}" data-name="${escapeHtml(otherName)}" data-avatar="${otherAvatar}">
                                <div class="conv-avatar-rel">
                                    <img src="${otherAvatar}" alt="" onerror="this.src='/assets/images/logo.png'">
                                </div>
                                <div class="conv-details">
                                    <div class="conv-top-row">
                                        <span class="conv-name">${escapeHtml(otherName)}</span>
                                        <span class="conv-time">${timeStr}</span>
                                    </div>
                                    <div class="conv-last-msg">${escapeHtml(conv.lastMessage || 'Bắt đầu trò chuyện...')}</div>
                                </div>
                            </div>
                        `;
                    }

                    convsListEl.innerHTML = html;

                    convsListEl.querySelectorAll('.conv-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const contact = {
                                uid: item.dataset.uid,
                                ndid: item.dataset.ndid,
                                name: item.dataset.name,
                                avatar: item.dataset.avatar,
                                isAdmin: item.dataset.type === 'admin',
                                isBot: item.dataset.type === 'ai'
                            };
                            selectConversation(contact);
                        });
                    });
                }, (err) => {
                    console.warn("Conversations listener error:", err);
                });
            } catch (e) {
                console.warn("Error subscribing conversations:", e);
            }
        }

        // Select Conversation
        async function selectConversation(contact) {
            activeContact = contact;

            if (contact.isBot) {
                activeChatId = 'chat_ndai_bot';
            } else {
                activeChatId = `chat_${[currentUser.uid, contact.uid].sort().join('_')}`;
                try {
                    const uSnap = await getDoc(doc(db, 'users', contact.uid));
                    if (uSnap.exists()) {
                        const d = uSnap.data();
                        if (d.photoURL) contact.avatar = d.photoURL;
                        if (d.fullname || d.displayName) contact.name = d.fullname || d.displayName;
                        if (d.ndid) contact.ndid = d.ndid;
                    }
                } catch (_) {}
            }

            // Update Header
            activeName.textContent = contact.name;
            activeNdid.textContent = contact.ndid;
            activeAvatar.src = contact.avatar;

            chatEmptyState.style.display = 'none';
            activeChatWrapper.style.display = 'flex';
            appWrapper.classList.add('mobile-active-chat');

            // Highlight selected in list
            document.querySelectorAll('.conv-item').forEach(el => {
                const isMatch = (contact.isBot && el.dataset.type === 'ai') ||
                                (contact.isAdmin && el.dataset.type === 'admin') ||
                                (el.dataset.chatId === activeChatId);
                el.classList.toggle('active', isMatch);
            });

            if (!contact.isBot) {
                try {
                    await setDoc(doc(db, 'chats', activeChatId), {
                        [`lastReadTime_${currentUser.uid}`]: serverTimestamp()
                    }, { merge: true });
                } catch (_) {}
            }

            subscribeMessages(activeChatId);
        }

        // Realtime Messages Listener
        function subscribeMessages(chatId) {
            if (unsubscribeMessages) unsubscribeMessages();
            messagesContainer.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-soft);font-size:13px;">Đang tải tin nhắn...</div>`;

            // NDAI BOT CHAT HANDLING (EduAI Engine)
            if (chatId === 'chat_ndai_bot') {
                renderAiMessages();
                return;
            }

            // STANDARD FIRESTORE REAL DIRECT CHAT (User to User & User to Admin)
            try {
                const q = query(
                    collection(db, 'chats', chatId, 'messages'),
                    orderBy('createdAt', 'asc')
                );

                unsubscribeMessages = onSnapshot(q, async (snapshot) => {
                    if (snapshot.empty) {
                        messagesContainer.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--text-soft);font-size:13px;">Chưa có tin nhắn nào. Hãy gửi lời chào đầu tiên! 👋</div>`;
                        return;
                    }

                    let contactLastRead = null;
                    try {
                        const chatSnap = await getDoc(doc(db, 'chats', chatId));
                        if (chatSnap.exists() && activeContact) {
                            const readTs = chatSnap.data()[`lastReadTime_${activeContact.uid}`];
                            if (readTs?.toMillis) contactLastRead = readTs.toMillis();
                        }
                    } catch (_) {}

                    let html = '';
                    snapshot.forEach(docSnap => {
                        const msgId = docSnap.id;
                        const msg = docSnap.data();
                        const isSent = msg.senderUid === currentUser.uid;
                        const msgTimeMillis = msg.createdAt?.toMillis ? msg.createdAt.toMillis() : Date.now();
                        const fullTimeStr = msg.createdAt?.toDate ? formatFullDateTime(msg.createdAt.toDate()) : '';

                        let statusTag = '';
                        if (isSent) {
                            if (contactLastRead && contactLastRead >= msgTimeMillis) {
                                statusTag = `<span class="msg-status-tag">· Đã xem</span>`;
                            } else {
                                statusTag = `<span style="color:var(--text-muted)">· Đã gửi</span>`;
                            }
                        }

                        let reactionsHtml = '';
                        if (msg.reactions) {
                            const counts = {};
                            Object.values(msg.reactions).forEach(emoji => {
                                counts[emoji] = (counts[emoji] || 0) + 1;
                            });
                            const badgeList = Object.entries(counts).map(([emoji, count]) =>
                                `<span class="reaction-badge" title="${count} người">${emoji} ${count > 1 ? count : ''}</span>`
                            ).join('');
                            if (badgeList) {
                                reactionsHtml = `<div class="reactions-badges">${badgeList}</div>`;
                            }
                        }

                        html += `
                            <div class="msg-row ${isSent ? 'sent' : 'received'}" data-msg-id="${msgId}">
                                <div class="msg-bubble-wrapper">
                                    <div class="msg-bubble" data-msg-id="${msgId}">${escapeHtml(msg.text)}</div>
                                    <div id="picker-${msgId}" class="reaction-picker-bar" style="display:none;">
                                        ${EMOJI_LIST.map(e => `<button class="reaction-btn" data-emoji="${e}" data-msg-id="${msgId}">${e}</button>`).join('')}
                                    </div>
                                </div>
                                ${reactionsHtml}
                                <div class="msg-meta">${fullTimeStr} ${statusTag}</div>
                            </div>
                        `;
                    });

                    messagesContainer.innerHTML = html;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;

                    messagesContainer.querySelectorAll('.msg-bubble').forEach(bubble => {
                        bubble.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const msgId = bubble.dataset.msgId;
                            togglePicker(msgId);
                        });
                    });

                    messagesContainer.querySelectorAll('.reaction-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const msgId = btn.dataset.msgId;
                            const emoji = btn.dataset.emoji;
                            addReaction(msgId, emoji);
                        });
                    });
                }, (err) => {
                    console.warn("Messages listener error:", err);
                });
            } catch (e) {
                console.warn("Subscribe messages error:", e);
            }
        }

        // NDAI Bot Messages Storage & EduAI Multi-Bubble Sentence Splitter
        function loadAiHistory() {
            const saved = localStorage.getItem('ndai_history_' + (currentUser?.uid || 'guest'));
            if (saved) {
                try { return JSON.parse(saved); } catch (_) {}
            }
            return [
                { sender: 'bot', text: 'Xin chào! Tôi là NDAI Assistant ✨, trợ lý trí tuệ nhân tạo của ND Labs. Tôi có thể giúp bạn giải đáp thắc mắc và học tập.' }
            ];
        }

        function saveAiHistory(history) {
            if (currentUser?.uid) {
                localStorage.setItem('ndai_history_' + currentUser.uid, JSON.stringify(history.slice(-30)));
            }
        }

        function splitIntoSentences(text) {
            const raw = text
                .replace(/\n{2,}/g, '\n')
                .replace(/([.!?])\s+/g, '$1\n')
                .split('\n')
                .map(s => s.trim())
                .filter(s => s.length > 0);
            
            const merged = [];
            for (const s of raw) {
                if (merged.length && s.length < 25)
                    merged[merged.length - 1] += ' ' + s;
                else
                    merged.push(s);
            }
            return merged;
        }

        function renderAiMessages() {
            const history = loadAiHistory();
            let html = '';
            history.forEach(msg => {
                const isSent = msg.sender === 'user';
                let contentHtml = escapeHtml(msg.text).replace(/\n/g, '<br>');
                if (!isSent && typeof marked !== 'undefined') {
                    try { contentHtml = marked.parse(msg.text); } catch (_) {}
                }

                html += `
                    <div class="msg-row ${isSent ? 'sent' : 'received'}">
                        <div class="msg-bubble-wrapper">
                            <div class="msg-bubble">${contentHtml}</div>
                        </div>
                        <div class="msg-meta">${formatFullDateTime(new Date())}</div>
                    </div>
                `;
            });

            messagesContainer.innerHTML = html;

            // Render KaTeX Math in AI messages (EduAI engine)
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(messagesContainer, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false }
                    ],
                    throwOnError: false
                });
            }

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Toggle Reaction Picker
        function togglePicker(msgId) {
            if (openPickerMsgId && openPickerMsgId !== msgId) {
                closePicker();
            }
            const picker = document.getElementById(`picker-${msgId}`);
            if (picker) {
                const isHidden = picker.style.display === 'none';
                if (isHidden) {
                    const row = picker.closest('.msg-row');
                    if (row && row.offsetTop < 80) {
                        picker.style.bottom = 'auto';
                        picker.style.top = '100%';
                        picker.style.marginTop = '6px';
                        picker.style.marginBottom = '0';
                    } else {
                        picker.style.bottom = '100%';
                        picker.style.top = 'auto';
                        picker.style.marginBottom = '6px';
                        picker.style.marginTop = '0';
                    }
                    picker.style.display = 'flex';
                    openPickerMsgId = msgId;
                } else {
                    picker.style.display = 'none';
                    openPickerMsgId = null;
                }
            }
        }

        function closePicker() {
            if (openPickerMsgId) {
                const picker = document.getElementById(`picker-${openPickerMsgId}`);
                if (picker) picker.style.display = 'none';
                openPickerMsgId = null;
            }
        }

        // Add Reaction to Message
        async function addReaction(msgId, emoji) {
            closePicker();
            if (!activeChatId || !currentUser || activeChatId === 'chat_ndai_bot') return;

            try {
                const msgRef = doc(db, 'chats', activeChatId, 'messages', msgId);
                const snap = await getDoc(msgRef);
                let currentReactions = {};
                if (snap.exists() && snap.data().reactions) {
                    currentReactions = { ...snap.data().reactions };
                }

                if (currentReactions[currentUser.uid] === emoji) {
                    delete currentReactions[currentUser.uid];
                } else {
                    currentReactions[currentUser.uid] = emoji;
                }

                await updateDoc(msgRef, {
                    reactions: currentReactions
                });
            } catch (err) {
                console.warn("Add reaction error:", err);
            }
        }

        // Send Message Handler
        chatInputForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !currentUser || !activeContact || !activeChatId) return;

            messageInput.value = '';

            // 1. NDAI BOT CHAT (EduAI Engine Execution)
            if (activeChatId === 'chat_ndai_bot') {
                const history = loadAiHistory();
                history.push({ sender: 'user', text: text });
                saveAiHistory(history);
                renderAiMessages();

                // Show thinking placeholder
                const thinkingDiv = document.createElement('div');
                thinkingDiv.className = 'msg-row received';
                thinkingDiv.innerHTML = `<div class="msg-bubble" style="font-style:italic;opacity:0.8;">🤖 NDAI đang suy nghĩ...</div>`;
                messagesContainer.appendChild(thinkingDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                try {
                    const greetInstruction = aiHasGreeted
                        ? 'Không chào hỏi, không dẫn nhập — trả lời thẳng vào câu hỏi.'
                        : 'Chào người dùng ngắn gọn một câu rồi trả lời ngay.';
                    aiHasGreeted = true;

                    const systemPrompt = `Bạn là NDAI Assistant — trợ lý trí tuệ nhân tạo thông minh của ND Labs. ${greetInstruction} Trả lời ngắn gọn, súc tích (tối đa 3-5 câu), mỗi câu là một ý độc lập. Hãy sử dụng định dạng Markdown (in đậm, in nghiêng) và công thức Toán/Lý/Hóa bằng LaTeX (sử dụng dấu đô-la: $...$ cho công thức nội dòng và $$...$$ cho công thức dạng khối).`;

                    const prompt = `${systemPrompt}\n\n[Câu hỏi của người dùng]: ${text}`;

                    let aiReply = '';
                    if (window.eduspaceAI && window.eduspaceAI.askGemini) {
                        aiReply = await window.eduspaceAI.askGemini(prompt);
                    } else {
                        const apiKey = await window.getGeminiApiKey();
                        const modelName = window.EDU_CONFIG?.stableModel || 'gemini-3.1-flash-lite';
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ role: 'user', parts: [{ text: prompt }] }]
                            })
                        });
                        const data = await res.json();
                        aiReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Dạ, tôi đã nhận được câu hỏi của bạn!";
                    }

                    // EduAI sentence bubble splitting
                    const sentences = splitIntoSentences(aiReply);
                    thinkingDiv.remove();

                    for (let i = 0; i < sentences.length; i++) {
                        const delay = Math.min(250 + sentences[i].length * 15, 1000);
                        await new Promise(r => setTimeout(r, delay));
                        history.push({ sender: 'bot', text: sentences[i] });
                        saveAiHistory(history);
                        renderAiMessages();
                    }
                } catch (err) {
                    if (thinkingDiv) thinkingDiv.remove();
                    history.push({ sender: 'bot', text: "Tôi đã nhận được câu hỏi của bạn!" });
                    saveAiHistory(history);
                    renderAiMessages();
                }
                return;
            }

            // 2. REAL FIRESTORE CHAT (Direct User-to-User & Direct User-to-Admin)
            try {
                await addDoc(collection(db, 'chats', activeChatId, 'messages'), {
                    senderUid: currentUser.uid,
                    senderNdid: currentUserNdid,
                    text: text,
                    createdAt: serverTimestamp()
                });

                await setDoc(doc(db, 'chats', activeChatId), {
                    participants: [currentUser.uid, activeContact.uid],
                    lastMessage: text,
                    updatedAt: serverTimestamp(),
                    [`lastReadTime_${currentUser.uid}`]: serverTimestamp(),
                    participantDetails: {
                        [currentUser.uid]: {
                            name: myName.textContent,
                            ndid: currentUserNdid,
                            avatar: myAvatar.src
                        },
                        [activeContact.uid]: {
                            name: activeContact.name,
                            ndid: activeContact.ndid,
                            avatar: activeContact.avatar
                        }
                    }
                }, { merge: true });

            } catch (err) {
                console.warn("Error sending message:", err);
            }
        });

        // Mobile Back Button
        mobileBackBtn.addEventListener('click', () => {
            appWrapper.classList.remove('mobile-active-chat');
        });

        // Date & Time Formatter
        function formatShortTime(date) {
            const h = date.getHours().toString().padStart(2, '0');
            const m = date.getMinutes().toString().padStart(2, '0');
            return `${h}:${m}`;
        }

        function formatFullDateTime(date) {
            const h = date.getHours().toString().padStart(2, '0');
            const min = date.getMinutes().toString().padStart(2, '0');
            const d = date.getDate().toString().padStart(2, '0');
            const mo = (date.getMonth() + 1).toString().padStart(2, '0');
            const y = date.getFullYear();
            return `${h}:${min} • ${d}/${mo}/${y}`;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Suppress any floating version pill tags on chat page
        setInterval(() => {
            document.querySelectorAll('.ver-tag, .version-tag, #version-tag, [class*="ver-tag"], [id*="version-tag"]').forEach(el => {
                el.remove();
            });
        }, 300);
    </script>
</body>
